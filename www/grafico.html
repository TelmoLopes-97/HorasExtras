<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Gráfico</title>
    <link rel="stylesheet" href="lib/framework7-bundle.min.css">
    <link rel="stylesheet" href="css/personalizado.css">
    <link rel="stylesheet" href="css/materialdesignicons.min.css">
</head>
<body>
    <div data-name="grafico" class="page page-horas color-theme-blue">
        <div class="navbar navbar-horas">
            <div class="navbar-bg"></div>
            <div class="navbar-inner">
                <div class="left">
                    <a href="#" data-panel=".panel-left" class="link icon-only panel-open">
                        <i class="mdi mdi-menu"></i>
                    </a>
                </div>
                <div class="title">Gráfico</div>
                <div class="right"></div>
            </div>
        </div>

        <div class="page-content horas-page-content">
            <div class="block block-strong inset horas-card horas-card-month">
                <div class="horas-month-shell">
                    <div class="horas-month-nav">
                        <button type="button" class="horas-chevron horas-chevron-prev">
                            <i class="mdi mdi-chevron-left"></i>
                        </button>
                        <select class="horas-mes-select" id="grafico-mes-select"></select>
                        <button type="button" class="horas-chevron horas-chevron-next">
                            <i class="mdi mdi-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="block horas-stats-grid">
                <div class="horas-stat-card">
                    <span class="horas-stat-label">EXTRA</span>
                    <span class="horas-stat-value horas-stat-positive" id="grafico-extra">+0h</span>
                </div>
                <div class="horas-stat-card">
                    <span class="horas-stat-label">FALTAS</span>
                    <span class="horas-stat-value horas-stat-negative" id="grafico-falta">-0h</span>
                </div>
                <div class="horas-stat-card">
                    <span class="horas-stat-label">SALDO</span>
                    <span class="horas-stat-value horas-stat-saldo" id="grafico-saldo">0h</span>
                </div>
            </div>

            <div class="block block-strong inset horas-card" style="padding:16px;">
                <canvas id="grafico-canvas" style="width:100%;height:260px;"></canvas>
            </div>

            <!-- Gráfico anual -->
            <div class="block-title horas-field-label" style="margin-top:16px;">Evolução anual:</div>
            <div class="block block-strong inset horas-card" style="padding:16px;">
            <canvas id="grafico-anual-canvas" style="width:100%;height:220px;display:block;"></canvas>
            </div>

        </div>
    </div>
</body>
</html>
